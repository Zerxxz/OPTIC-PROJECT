    file: assets/agents.js
  - path: /assets/links.js
    file: assets/links.js
  - path: /assets/tracks.js
    file: assets/tracks.js

  # Static assets (Vite publicDir — copied to dist/ root)
  - path: /zklogin.mjs
    file: zklogin.mjs
